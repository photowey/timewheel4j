name: Maven Central Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example 1.0.0
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest

    env:
      MAVEN_REPO: /home/runner/.m2/repository
      MAVEN_CENTRAL_KEY_NAME: ${{ secrets.MAVEN_CENTRAL_KEY_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        id: setup-java-11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: temurin
          cache: maven

      - name: Set up JDK 17
        id: setup-java-17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_CENTRAL_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_CENTRAL_GPG_PASSPHRASE

      - name: Configure Maven toolchains
        run: |
          mkdir -p ~/.m2
          cat <<'EOF' > ~/.m2/toolchains.xml
          <?xml version="1.0" encoding="UTF-8"?>
          <toolchains xmlns="http://maven.apache.org/TOOLCHAINS/1.1.0"
                      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                      xsi:schemaLocation="http://maven.apache.org/TOOLCHAINS/1.1.0 https://maven.apache.org/xsd/toolchains-1.1.0.xsd">
            <toolchain>
              <type>jdk</type>
              <provides>
                <version>11</version>
              </provides>
              <configuration>
                <jdkHome>${{ steps.setup-java-11.outputs.path }}</jdkHome>
              </configuration>
            </toolchain>
            <toolchain>
              <type>jdk</type>
              <provides>
                <version>17</version>
              </provides>
              <configuration>
                <jdkHome>${{ steps.setup-java-17.outputs.path }}</jdkHome>
              </configuration>
            </toolchain>
          </toolchains>
          EOF

      - name: Set release version
        run: mvn -B versions:set-property -Dproperty=reversion -DnewVersion="${{ inputs.version }}" -DgenerateBackupPoms=false

      - name: Publish to Maven Central
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_CENTRAL_GPG_PASSPHRASE: ${{ secrets.MAVEN_CENTRAL_GPG_PASSPHRASE }}
        run: mvn -B -Ptoolchain,release -DskipTests deploy
