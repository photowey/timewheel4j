name: Java CI with Maven

on:
  push:
    branches:
      - main
      - dev
      - feature/**
  pull_request:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    env:
      MAVEN_REPO: /home/runner/.m2/repository

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        id: setup-java-11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: temurin
          cache: maven

      - name: Set up JDK 17
        id: setup-java-17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Configure Maven toolchains
        run: |
          mkdir -p ~/.m2
          cat <<'EOF' > ~/.m2/toolchains.xml
          <?xml version="1.0" encoding="UTF-8"?>
          <toolchains xmlns="http://maven.apache.org/TOOLCHAINS/1.1.0"
                      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                      xsi:schemaLocation="http://maven.apache.org/TOOLCHAINS/1.1.0 https://maven.apache.org/xsd/toolchains-1.1.0.xsd">
            <toolchain>
              <type>jdk</type>
              <provides>
                <version>11</version>
              </provides>
              <configuration>
                <jdkHome>${{ steps.setup-java-11.outputs.path }}</jdkHome>
              </configuration>
            </toolchain>
            <toolchain>
              <type>jdk</type>
              <provides>
                <version>17</version>
              </provides>
              <configuration>
                <jdkHome>${{ steps.setup-java-17.outputs.path }}</jdkHome>
              </configuration>
            </toolchain>
          </toolchains>
          EOF

      - name: Verify reactor
        run: mvn -B -Ptoolchain verify

      - name: Build benchmark jar
        run: mvn -B -Pbenchmark -pl timewheel4j-core -am -DskipTests package
